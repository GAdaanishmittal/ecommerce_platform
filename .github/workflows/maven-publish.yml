name: Build Jar on Push

on:
  push:
    branches:
      - GARC

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21

    - name: Build with Maven
      run: mvn -B clean package

    - name: Install Snyk
      uses: snyk/actions/setup@v1

    - name: Fix mvnw permissions
      run: chmod +x mvnw

    # 🔐 Demo Mode – Scan but do not fail build
    - name: Run Snyk Security Scan and Generate Report
      run: snyk test --severity-threshold=high --json-file-output=snyk-report.json
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    # 📄 Upload Snyk JSON report as artifact
    - name: Upload Snyk Security Report
      uses: actions/upload-artifact@v4
      with:
        name: snyk-security-report
        path: snyk-report.json

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-jar-file
        path: target/*.jar
